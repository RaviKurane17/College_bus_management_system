<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard - SGI Bus System</title>
  <link rel="stylesheet" href="css/style.css?v=3">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      font-family: 'Outfit', 'Poppins', sans-serif;
      color: #f8fafc;
      transition: background 0.4s, color 0.4s;
    }
    /* Sidebar */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      width: 220px;
      background: rgba(15, 23, 42, 0.98);
      box-shadow: 2px 0 16px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      z-index: 200;
      transition: transform 0.3s cubic-bezier(.4,0,.2,1);
    }
    .sidebar.collapsed {
      transform: translateX(-100%);
    }
    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--primary, #ffb703);
      padding: 28px 24px 18px 24px;
    }
    .sidebar-header i {
      font-size: 1.5rem;
    }
    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-top: 10px;
      padding: 0 10px;
    }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      color: #f8fafc;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 500;
      font-size: 1rem;
      transition: background 0.2s, color 0.2s;
    }
    .sidebar-nav a.active, .sidebar-nav a:hover {
      background: linear-gradient(90deg, #ffb70322 0%, #fb850022 100%);
      color: #ffb703;
    }
    .sidebar-footer {
      margin-top: auto;
      padding: 18px 24px;
    }
    .dark-mode-toggle {
      background: rgba(255,255,255,0.06);
      color: #ffb703;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s;
    }
    .dark-mode-toggle:hover {
      background: rgba(255,183,3,0.12);
    }

    /* Sidebar overlay for mobile */
    .sidebar-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15,23,42,0.5);
      z-index: 150;
    }
    .sidebar-open .sidebar-overlay {
      display: block;
    }

    /* Main Content */
    .main-content {
      margin-left: 220px;
      transition: margin-left 0.3s cubic-bezier(.4,0,.2,1);
    }
    @media (max-width: 900px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main-content {
        margin-left: 0;
      }
    }

    /* Top Navigation Bar */
    .student-navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 25px;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .student-navbar .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary, #ffb703);
    }

    .student-navbar .nav-brand i {
      font-size: 1.5rem;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .nav-actions .logout-btn {
      padding: 8px 18px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-actions .logout-btn:hover {
      background: rgba(239, 68, 68, 0.3);
      transform: translateY(-1px);
    }

    /* Page Container */
    .student-page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 20px;
    }
    
    /* Improved Card Styling */
    .card-common {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 25px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    .card-common:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(255,183,3,0.1);
    }

    /* Profile Hero Card */
    .profile-hero {
      background: linear-gradient(135deg, rgba(255,183,3,0.10), rgba(15,23,42,0.10));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 35px 30px;
      text-align: center;
      margin-bottom: 25px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(255,183,3,0.07);
    }
    .profile-hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 100px;
      background: linear-gradient(135deg, rgba(255,183,3,0.18), rgba(251,133,0,0.13));
      z-index: 0;
    }

    .profile-avatar {
      position: relative;
      z-index: 1;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid var(--primary, #ffb703);
      object-fit: cover;
      margin-bottom: 15px;
      box-shadow: 0 8px 25px rgba(255, 183, 3, 0.2);
    }

    .profile-avatar-placeholder {
      position: relative;
      z-index: 1;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(255, 183, 3, 0.15);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 4px solid var(--primary, #ffb703);
      margin-bottom: 15px;
    }

    .profile-avatar-placeholder i {
      font-size: 3rem;
      color: var(--primary, #ffb703);
    }

    .profile-name {
      position: relative;
      z-index: 1;
      font-size: 1.8rem;
      font-weight: 800;
      margin: 0;
      background: linear-gradient(135deg, #ffb703, #fb8500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .profile-subtitle {
      position: relative;
      z-index: 1;
      color: #94a3b8;
      margin: 5px 0 20px;
      font-size: 0.95rem;
    }

    .profile-badges {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .badge {
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .badge-primary {
      background: rgba(255, 183, 3, 0.15);
      color: #ffb703;
      border: 1px solid rgba(255,183,3,0.3);
    }

    .badge-blue {
      background: rgba(59, 130, 246, 0.15);
      color: #60a5fa;
      border: 1px solid rgba(59,130,246,0.3);
    }

    .badge-green {
      background: rgba(34, 197, 94, 0.15);
      color: #4ade80;
      border: 1px solid rgba(34,197,94,0.3);
    }

    .badge-red {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.3);
    }

    /* Fee Summary Boxes */
    .fee-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 25px;
    }

    .fee-box {
      composes: card-common;
      padding: 25px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    
    .fee-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent-color), transparent);
    }
    
    .fee-box.total::before { --accent-color: #60a5fa; }
    .fee-box.paid::before { --accent-color: #4ade80; }
    .fee-box.pending::before { --accent-color: #f87171; }

    .fee-box:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.08);
    }

    .fee-box .fee-label {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .fee-box .fee-amount {
      font-size: 1.6rem;
      font-weight: 800;
    }

    .fee-box.total .fee-amount { color: #60a5fa; }
    .fee-box.paid .fee-amount { color: #4ade80; }
    .fee-box.pending .fee-amount { color: #f87171; }

    /* Info Cards Grid */
    .info-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 25px;
    }

    .info-card {
      composes: card-common;
      padding: 25px;
    }
    
    .info-card h3 {
      margin: 25px 0 20px;
      font-size: 1.1rem;
      padding-bottom: 12px;
      border-bottom: 2px solid rgba(255,183,3,0.2);
    }

    .info-card h3 {
      margin: 0 0 18px;
      font-size: 1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .info-card h3 i {
      color: var(--primary, #ffb703);
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 0.9rem;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-row .label {
      color: #94a3b8;
    }

    .info-row .value {
      font-weight: 600;
      color: #e2e8f0;
    }

    /* Bus Pass Card */
    .bus-pass-preview {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 25px;
    }

    .bus-pass-preview h3 {
      margin: 0 0 18px;
      font-size: 1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .bus-pass-preview h3 i { color: var(--primary, #ffb703); }

    .pass-mini-card {
      background: linear-gradient(135deg, rgba(255,183,3,0.1), rgba(251,133,0,0.05));
      border: 1px solid rgba(255,183,3,0.2);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .pass-mini-card .pass-info p {
      margin: 4px 0;
      font-size: 0.9rem;
      color: #e2e8f0;
    }

    .pass-mini-card .pass-info .pass-label {
      color: #94a3b8;
      font-size: 0.8rem;
    }

    .print-pass-btn {
      padding: 8px 20px;
      background: linear-gradient(135deg, #ffb703, #fb8500);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      transition: 0.3s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .print-pass-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255,183,3,0.3);
    }

    /* Payment History Card */
    .payment-history {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 25px;
    }

    .payment-history h3 {
      margin: 0 0 18px;
      font-size: 1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .payment-history h3 i { color: var(--primary, #ffb703); }

    .payment-item {
      composes: card-common;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px;
      margin-bottom: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
    }
    
    .payment-item:hover {
      background: rgba(255,255,255,0.06);
      transform: translateY(-2px);
    }

    .payment-item:hover {
      background: rgba(255,255,255,0.06);
    }

    .payment-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .payment-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(34, 197, 94, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4ade80;
    }

    .payment-details .pay-amount {
      font-weight: 700;
      font-size: 1rem;
      color: #4ade80;
    }

    .payment-details .pay-mode {
      font-size: 0.8rem;
      color: #94a3b8;
    }

    .payment-right {
      text-align: right;
    }

    .payment-right .pay-date {
      font-size: 0.85rem;
      color: #e2e8f0;
    }

    .payment-right .pay-utr {
      font-size: 0.75rem;
      color: #64748b;
    }

    .empty-state {
      text-align: center;
      padding: 40px 30px;
      color: #64748b;
      background: rgba(255,255,255,0.03);
      border-radius: 16px;
      margin: 20px 0;
    }
    
    .empty-state i {
      font-size: 2.5rem;
      margin-bottom: 15px;
      display: block;
      opacity: 0.8;
    }
    
    .empty-state p {
      margin: 10px 0;
      font-size: 0.95rem;
    }
    
    /* Loading Animation */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .skeleton-loader {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
    }

    .empty-state i {
      font-size: 2.5rem;
      margin-bottom: 10px;
      display: block;
    }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .student-page > * { animation: fadeInUp 0.5s ease both; }
    .student-page > *:nth-child(1) { animation-delay: 0.05s; }
    .student-page > *:nth-child(2) { animation-delay: 0.1s; }
    .student-page > *:nth-child(3) { animation-delay: 0.15s; }
    .student-page > *:nth-child(4) { animation-delay: 0.2s; }
    .student-page > *:nth-child(5) { animation-delay: 0.25s; }
    .student-page > *:nth-child(6) { animation-delay: 0.3s; }

    /* Query Section */
    .query-section {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 25px;
    }
    .query-section h3 {
      margin: 0 0 18px;
      font-size: 1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #f8fafc;
    }
    .query-section h3 i { color: #ffb703; }
    .query-input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #f8fafc;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.3s;
      box-sizing: border-box;
      margin-bottom: 10px;
    }
    .query-input:focus { border-color: #ffb703; }
    .query-input::placeholder { color: #64748b; }
    .submit-query-btn {
      padding: 10px 24px;
      background: linear-gradient(135deg, #ffb703, #fb8500);
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      transition: 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .submit-query-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,183,3,0.3); }

    /* Query Item */
    .query-item {
      padding: 14px 16px;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 10px;
    }
    .query-item .q-subject { font-weight: 700; font-size: 0.9rem; color: #e2e8f0; margin-bottom: 4px; }
    .query-item .q-message { font-size: 0.85rem; color: #94a3b8; margin-bottom: 8px; }
    .query-item .q-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .q-status { padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
    .q-status.open { background: rgba(239,68,68,0.15); color: #f87171; }
    .q-status.resolved { background: rgba(34,197,94,0.15); color: #4ade80; }
    .q-status.in_progress { background: rgba(255,183,3,0.15); color: #ffb703; }
    .q-date { font-size: 0.75rem; color: #64748b; }
    .q-reply { margin-top: 10px; padding: 10px 14px; background: rgba(255,183,3,0.05); border-left: 3px solid #ffb703; border-radius: 4px; font-size: 0.85rem; color: #e2e8f0; }
    .q-reply-label { font-size: 0.75rem; color: #ffb703; font-weight: 700; margin-bottom: 4px; }

    /* Mobile Responsive */
    @media (max-width: 640px) {
      .student-page { padding: 15px 12px; }
      .profile-hero { padding: 25px 10px; }
      .profile-name { font-size: 1.2rem; }
      .fee-summary { grid-template-columns: 1fr; }
      .info-cards { grid-template-columns: 1fr; }
      .pass-mini-card { flex-direction: column; text-align: center; }
      .student-navbar { padding: 12px 15px; }
      .student-navbar .nav-brand { font-size: 1rem; }
      .sidebar { width: 80vw; min-width: 180px; max-width: 320px; }
      .main-content { margin-left: 0; }
    }

    /* Light Mode Overrides */
    body.light-mode {
      background: linear-gradient(135deg, #f8fafc, #e2e8f0);
      color: #0f172a;
    }
    body.light-mode .sidebar {
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 2px 0 16px rgba(0,0,0,0.05);
    }
    body.light-mode .sidebar-nav a {
      color: #334155;
    }
    body.light-mode .sidebar-nav a:hover, body.light-mode .sidebar-nav a.active {
      background: rgba(255, 183, 3, 0.15);
    }
    body.light-mode .dark-mode-toggle {
      background: rgba(0,0,0,0.05);
      color: #0f172a;
    }
    body.light-mode .student-navbar {
      background: rgba(255, 255, 255, 0.9);
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    body.light-mode .card-common, body.light-mode .fee-box, body.light-mode .info-card, body.light-mode .payment-item {
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(0,0,0,0.08);
      color: #1e293b;
    }
    body.light-mode .profile-hero {
      background: linear-gradient(135deg, rgba(255,183,3,0.15), rgba(255,255,255,0.8));
      border: 1px solid rgba(0,0,0,0.08);
    }
    body.light-mode .profile-subtitle, body.light-mode .info-row .label, body.light-mode .fee-box .fee-label, body.light-mode .pass-label {
      color: #475569;
    }
    body.light-mode .info-row .value, body.light-mode .pass-mini-card .pass-info p, body.light-mode .payment-right .pay-date {
      color: #0f172a;
    }
    body.light-mode .info-row {
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    body.light-mode .bus-pass-preview, body.light-mode .payment-history, body.light-mode .query-section {
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(0,0,0,0.08);
    }
    body.light-mode .pass-mini-card {
      background: linear-gradient(135deg, rgba(255,183,3,0.1), rgba(255,255,255,0.9));
    }
    body.light-mode .payment-item {
      background: rgba(0,0,0,0.02);
    }
    body.light-mode .payment-item:hover {
      background: rgba(0,0,0,0.04);
    }
    body.light-mode .query-input {
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(0,0,0,0.15);
      color: #0f172a;
    }
    body.light-mode .query-item {
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(0,0,0,0.08);
    }
    body.light-mode .query-item .q-subject, body.light-mode .query-section h3, body.light-mode .payment-history h3, body.light-mode .bus-pass-preview h3, body.light-mode .info-card h3 {
      color: #0f172a;
    }
    body.light-mode .query-item .q-message {
      color: #334155;
    }
    body.light-mode .empty-state {
      background: rgba(0,0,0,0.02);
    }
    body.light-mode .q-reply {
      background: rgba(255,183,3,0.1);
      color: #1e293b;
    }
  </style>
</head>
  <body>
    <!-- Sidebar Navigation -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <i class="fa-solid fa-bus-simple"></i>
        <span>SGI Transport</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="active" id="navDashboard"><i class="fa-solid fa-house"></i> Dashboard</a>
        <a href="#busPassSection" id="navBusPass"><i class="fa-solid fa-id-card"></i> Bus Pass</a>
        <a href="#studentPayments" id="navPayments"><i class="fa-solid fa-receipt"></i> Payments</a>
        <a href="#sendQuerySection" id="navQueries"><i class="fa-solid fa-question-circle"></i> Queries</a>
        <a href="#studentInfo" id="navProfile"><i class="fa-solid fa-user"></i> Profile</a>
        <a href="#" onclick="openChangePasswordModal(event)"><i class="fa-solid fa-key"></i> Change Password</a>
      </nav>
      <div class="sidebar-footer">
        <button id="darkModeToggle" class="dark-mode-toggle" aria-label="Toggle dark mode">
          <i class="fa-solid fa-moon"></i> Dark Mode
        </button>
      </div>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent">
      <!-- Top Navigation -->
      <nav class="student-navbar">
        <button id="sidebarToggle" class="sidebar-toggle">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div class="nav-brand">
          <i class="fa-solid fa-bus-simple"></i>
          SGI Transport
        </div>
        <div class="nav-actions">
          <button id="logoutBtn" class="logout-btn">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
          </button>
        </div>
      </nav>

      <div class="student-page">
    <!-- Profile Hero -->
    <section id="studentInfo">
      <div class="profile-hero">
        <div class="profile-avatar-placeholder">
          <i class="fa-solid fa-user-graduate"></i>
        </div>
        <h1 class="profile-name">Loading...</h1>
        <p class="profile-subtitle">Fetching your data...</p>
      </div>
    </section>

    <!-- Fee Summary -->
    <section id="feeSummary" style="display: none;">
      <div class="fee-summary">
        <div class="fee-box total">
          <div class="fee-label">Total Fees</div>
          <div class="fee-amount" id="feeTotal">₹0</div>
        </div>
        <div class="fee-box paid">
          <div class="fee-label">Fees Paid</div>
          <div class="fee-amount" id="feePaid">₹0</div>
        </div>
        <div class="fee-box pending">
          <div class="fee-label">Remaining</div>
          <div class="fee-amount" id="feeRemaining">₹0</div>
        </div>
      </div>
    </section>

    <!-- Info Cards -->
    <section id="infoCards" style="display: none;">
      <div class="info-cards">
        <div class="info-card" id="personalInfoCard"></div>
        <div class="info-card" id="busInfoCard"></div>
      </div>
    </section>

    <!-- Bus Pass -->
    <section id="busPassSection" style="display: none;">
      <div class="bus-pass-preview" id="busPassContent"></div>
    </section>

    <!-- Payment History -->
    <section id="studentPayments">
      <div class="payment-history">
        <h3><i class="fa-solid fa-clock-rotate-left"></i> Payment History</h3>
        <div id="paymentsList">
          <div class="empty-state">
            <i class="fa-solid fa-spinner fa-spin"></i>
            Loading payments...
          </div>
        </div>
      </div>
    </section>

    <!-- Send Query Section -->
    <section id="sendQuerySection" style="display:none;">
      <div class="query-section">
        <h3><i class="fa-solid fa-paper-plane"></i> Send Query to Admin</h3>
        <input type="text" id="querySubject" class="query-input" placeholder="Subject (e.g. Bus delay, Fee issue, Route change)" maxlength="200">
        <textarea id="queryMessage" class="query-input" rows="4" placeholder="Describe your query or concern in detail..."></textarea>
        <div style="margin-bottom: 15px;">
          <label class="q-reply-label" style="display:block; margin-bottom: 5px;">Attachment (Optional, max 5MB)</label>
          <input type="file" id="queryAttachment" class="query-input" accept=".jpg,.jpeg,.png,.pdf" style="padding: 8px;">
        </div>
        <button class="submit-query-btn" onclick="submitQuery()" id="submitQueryBtn">
          <i class="fa-solid fa-paper-plane"></i> Submit Query
        </button>
        <div id="queryMsg" style="margin-top:10px;font-size:0.85rem;"></div>
      </div>

      <!-- My Queries History -->
      <div class="query-section">
        <h3><i class="fa-solid fa-list-check"></i> My Queries</h3>
        <div id="myQueriesList">
          <div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div>
        </div>
      </div>
    </section>
  </div>

    <!-- Change Password Modal -->
    <div id="passwordModal" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
      <div class="card-common" style="background:#0f172a; max-width:400px; width:90%; padding:25px; position:relative;">
        <button onclick="closeChangePasswordModal()" style="position:absolute; right:15px; top:15px; background:none; border:none; color:#f8fafc; cursor:pointer;"><i class="fa-solid fa-xmark fa-lg"></i></button>
        <h3 style="margin-top:0;"><i class="fa-solid fa-key" style="color:#ffb703;"></i> Change Password</h3>
        <form id="changePasswordForm">
          <input type="password" id="oldPassword" class="query-input" placeholder="Current Password" required>
          <input type="password" id="newPassword" class="query-input" placeholder="New Password (min 6 chars)" required minlength="6">
          <input type="password" id="confirmPassword" class="query-input" placeholder="Confirm New Password" required minlength="6">
          <button type="submit" class="submit-query-btn" style="width:100%; justify-content:center; margin-top:10px;">Update Password</button>
          <div id="passwordMsg" style="margin-top:10px; text-align:center; font-size:0.9rem;"></div>
        </form>
      </div>
    </div>

  <script src="js/script.js?v=3"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script>
    function openChangePasswordModal(e) {
      e.preventDefault();
      document.getElementById('passwordModal').style.display = 'flex';
    }
    function closeChangePasswordModal() {
      document.getElementById('passwordModal').style.display = 'none';
      document.getElementById('changePasswordForm').reset();
      document.getElementById('passwordMsg').innerHTML = '';
    }
    
    document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const oldPassword = document.getElementById('oldPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const msgEl = document.getElementById('passwordMsg');
      
      if (newPassword !== confirmPassword) {
        msgEl.innerHTML = '<span style="color:#f87171;">New passwords do not match!</span>';
        return;
      }
      msgEl.innerHTML = '<span style="color:#f8fafc;">Updating...</span>';
      
      try {
        const res = await apiFetch('/api/students/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ oldPassword, newPassword })
        });
        
        if (res.success) {
          msgEl.innerHTML = '<span style="color:#4ade80;">Password changed successfully!</span>';
          setTimeout(closeChangePasswordModal, 2000);
        } else {
          msgEl.innerHTML = `<span style="color:#f87171;">${res.message}</span>`;
        }
      } catch (err) {
        msgEl.innerHTML = '<span style="color:#f87171;">Error updating password.</span>';
      }
    });

    // Sidebar toggle for mobile
    const sidebar = document.getElementById('sidebar');
    const sidebarToggle = document.getElementById('sidebarToggle');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const mainContent = document.getElementById('mainContent');
    function openSidebar() {
      sidebar.classList.add('open');
      document.body.classList.add('sidebar-open');
    }
    function closeSidebar() {
      sidebar.classList.remove('open');
      document.body.classList.remove('sidebar-open');
    }
    if (sidebarToggle) {
      sidebarToggle.addEventListener('click', openSidebar);
    }
    if (sidebarOverlay) {
      sidebarOverlay.addEventListener('click', closeSidebar);
    }
    // Close sidebar on nav click (mobile)
    document.querySelectorAll('.sidebar-nav a').forEach(link => {
      link.addEventListener('click', () => {
        if (window.innerWidth < 900) closeSidebar();
      });
    });

    // Active nav highlight
    function setActiveNav() {
      const sections = [
        {id: 'navDashboard', section: 'studentInfo'},
        {id: 'navBusPass', section: 'busPassSection'},
        {id: 'navPayments', section: 'studentPayments'},
        {id: 'navQueries', section: 'sendQuerySection'},
        {id: 'navProfile', section: 'studentInfo'}
      ];
      let found = false;
      sections.forEach(({id, section}) => {
        const nav = document.getElementById(id);
        const sec = document.getElementById(section);
        if (nav && sec) {
          const rect = sec.getBoundingClientRect();
          if (!found && rect.top < window.innerHeight/2 && rect.bottom > 0) {
            nav.classList.add('active');
            found = true;
          } else {
            nav.classList.remove('active');
          }
        }
      });
    }
    window.addEventListener('scroll', setActiveNav);
    window.addEventListener('resize', setActiveNav);
    setActiveNav();

    // Dark mode toggle
    const darkModeToggle = document.getElementById('darkModeToggle');
    function setDarkMode(on) {
      if (on) {
        document.body.classList.remove('light-mode');
        localStorage.setItem('darkMode', '1');
        if (darkModeToggle) darkModeToggle.innerHTML = '<i class="fa-solid fa-sun"></i> Light Mode';
      } else {
        document.body.classList.add('light-mode');
        localStorage.setItem('darkMode', '0');
        if (darkModeToggle) darkModeToggle.innerHTML = '<i class="fa-solid fa-moon"></i> Dark Mode';
      }
    }
    if (darkModeToggle) {
      darkModeToggle.addEventListener('click', () => {
        const isDark = localStorage.getItem('darkMode') !== '1';
        setDarkMode(isDark);
      });
      // On load
      setDarkMode(localStorage.getItem('darkMode') === '1');
    }
    let currentStudentId = null;

    document.addEventListener('DOMContentLoaded', async () => {
      // Responsive sidebar state
      if (window.innerWidth < 900) {
        closeSidebar();
      }
      const username = localStorage.getItem('studentUser');
      if (!username) { window.location.href = '/login.html'; return; }

      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.clear();
        window.location.href = '/login.html';
      });

      try {
        const res = await apiFetch(`/api/students/profile/${username}`);
        if (res && res.success) {
          const s = res.student || {};
          currentStudentId = s.id;

          // Profile Hero
          const studentInfo = document.getElementById('studentInfo');
          const remaining = parseFloat(s.remaining_fees || 0);
          const statusBadge = remaining > 0
            ? '<span class="badge badge-red"><i class="fa-solid fa-clock"></i> Fees Pending</span>'
            : '<span class="badge badge-green"><i class="fa-solid fa-check"></i> Fees Cleared</span>' +
              ` <button onclick="printNoDuesReceipt(${s.id})" style="padding: 4px 10px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; margin-left: 8px;"><i class="fa-solid fa-print"></i> No Dues Certificate</button>`;

          studentInfo.innerHTML = `
            <div class="profile-hero">
              ${s.photo_url
                ? `<img src="${s.photo_url}" class="profile-avatar" alt="Photo">`
                : `<div class="profile-avatar-placeholder"><i class="fa-solid fa-user-graduate"></i></div>`
              }
              <h1 class="profile-name">${escapeHtml(s.name) || 'Student'}</h1>
              <p class="profile-subtitle">${escapeHtml(s.department || '')} ${s.course_year ? '• ' + escapeHtml(s.course_year) : ''} ${s.section ? '• Section ' + escapeHtml(s.section) : ''}</p>
              <div class="profile-badges">
                <span class="badge badge-primary"><i class="fa-solid fa-id-badge"></i> ${escapeHtml(s.roll_no)}</span>
                ${s.bus_number ? `<span class="badge badge-blue"><i class="fa-solid fa-bus"></i> Bus ${escapeHtml(s.bus_number)}</span>` : ''}
                ${statusBadge}
              </div>
            </div>
          `;

          // Fee Summary
          document.getElementById('feeSummary').style.display = 'block';
          document.getElementById('feeTotal').textContent = '₹' + parseFloat(s.total_fees || 0).toLocaleString('en-IN');
          document.getElementById('feePaid').textContent = '₹' + parseFloat(s.fees_paid || 0).toLocaleString('en-IN');
          document.getElementById('feeRemaining').textContent = '₹' + remaining.toLocaleString('en-IN');

          // Info Cards
          document.getElementById('infoCards').style.display = 'block';
          document.getElementById('personalInfoCard').innerHTML = `
            <h3><i class="fa-solid fa-user"></i> Personal Info</h3>
            <div class="info-row"><span class="label">Roll No</span><span class="value">${escapeHtml(s.roll_no) || 'N/A'}</span></div>
            <div class="info-row"><span class="label">Phone</span><span class="value">${escapeHtml(s.phone) || 'N/A'}</span></div>
            <div class="info-row"><span class="label">Email</span><span class="value">${escapeHtml(s.email) || 'N/A'}</span></div>
            <div class="info-row"><span class="label">Address</span><span class="value">${escapeHtml(s.address) || 'N/A'}</span></div>
          `;
          document.getElementById('busInfoCard').innerHTML = `
            <h3><i class="fa-solid fa-bus"></i> Transport Info</h3>
            <div class="info-row"><span class="label">Bus No</span><span class="value">${escapeHtml(s.bus_number) || 'Not Assigned'}</span></div>
            <div class="info-row"><span class="label">Route</span><span class="value">${escapeHtml(s.route) || 'N/A'}</span></div>
            <div class="info-row"><span class="label">Driver</span><span class="value">${escapeHtml(s.driver_name) || 'Not Assigned'}</span></div>
            <div class="info-row"><span class="label">Driver Phone</span><span class="value">${escapeHtml(s.driver_phone) || 'N/A'}</span></div>
            <div class="info-row"><span class="label">Pass From</span><span class="value">${s.pass_valid_from ? formatDate(s.pass_valid_from) : 'N/A'}</span></div>
            <div class="info-row"><span class="label">Pass To</span><span class="value">${s.pass_valid_to ? formatDate(s.pass_valid_to) : 'N/A'}</span></div>
            <div class="info-row"><span class="label">Status</span><span class="value" style="color: ${remaining > 0 ? '#f87171' : '#4ade80'};">${remaining > 0 ? '⚠️ Pending' : '✅ Clear'}</span></div>
          `;

          // Bus Pass
          if (s.bus_number) {
            document.getElementById('busPassSection').style.display = 'block';
            document.getElementById('busPassContent').innerHTML = `
              <h3>
                <span><i class="fa-solid fa-id-card"></i> My Bus Pass</span>
                <button class="print-pass-btn" id="printPassBtn"><i class="fa-solid fa-print"></i> Print Pass</button>
              </h3>
              <div class="pass-mini-card">
                ${s.photo_url ? `<img src="${s.photo_url}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;border:3px solid #ffb703;">` : ''}
                <div class="pass-info">
                  <p style="font-weight:700;font-size:1.1rem;color:#ffb703;">${escapeHtml(s.name)}</p>
                  <p><span class="pass-label">Bus:</span> ${escapeHtml(s.bus_number)} &nbsp;|&nbsp; <span class="pass-label">Route:</span> ${escapeHtml(s.route || 'N/A')}</p>
                  <p><span class="pass-label">Valid:</span> ${s.pass_valid_from ? formatDate(s.pass_valid_from) + ' → ' + formatDate(s.pass_valid_to) : 'Contact Admin'}</p>
                </div>
              </div>
            `;
            document.getElementById('printPassBtn').onclick = () => { if (s.id) generateBusPass(s.id); };
          }

          // Payments
          const paymentsRes = await apiFetch(`/api/students/username/${username}/payments`);
          const paymentsList = document.getElementById('paymentsList');
          if (paymentsRes.success && paymentsRes.payments.length > 0) {
            window.currentStudentData = s;
            window.currentPayments = paymentsRes.payments;
            paymentsList.innerHTML = paymentsRes.payments.map(p => `
              <div class="payment-item">
                <div class="payment-left">
                  <div class="payment-icon"><i class="fa-solid fa-indian-rupee-sign"></i></div>
                  <div class="payment-details">
                    <div class="pay-amount">₹${parseFloat(p.amount).toLocaleString('en-IN')}</div>
                    <div class="pay-mode">${escapeHtml(p.payment_mode)}</div>
                  </div>
                </div>
                <div class="payment-right" style="flex: 1; text-align: right;">
                  <div class="pay-date">${new Date(p.payment_date).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' })}</div>
                  <div class="pay-utr">${p.utr_number ? 'UTR: ' + escapeHtml(p.utr_number) : ''}</div>
                </div>
                <div style="margin-left: 15px;">
                  <button onclick="printStudentReceipt(${p.id})" style="padding: 6px 12px; background: linear-gradient(135deg, #ffb703, #fb8500); color: #000; border: none; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 5px; font-weight: bold; font-size: 0.85rem; box-shadow: 0 2px 5px rgba(255,183,3,0.3); transition: 0.2s;"><i class="fa-solid fa-file-invoice"></i> Receipt</button>
                </div>
              </div>
            `).join('');
          } else {
            paymentsList.innerHTML = `<div class="empty-state"><i class="fa-solid fa-receipt"></i><p>No payment history found yet.</p></div>`;
          }

          // Show query section and load past queries
          document.getElementById('sendQuerySection').style.display = 'block';
          loadMyQueries(s.id);

        } else {
          document.getElementById('studentInfo').innerHTML = '<div class="profile-hero"><h1 class="profile-name">Error</h1><p class="profile-subtitle">Failed to load student data. Please log in again.</p></div>';
        }
      } catch (error) {
        console.error('Error loading student profile:', error);
        document.getElementById('studentInfo').innerHTML = '<div class="profile-hero"><h1 class="profile-name">Error</h1><p class="profile-subtitle">Failed to load data. Try again later.</p></div>';
      }
    });

    async function submitQuery() {
      const subject = document.getElementById('querySubject').value.trim();
      const message = document.getElementById('queryMessage').value.trim();
      const attachmentInput = document.getElementById('queryAttachment');
      const msgEl = document.getElementById('queryMsg');
      const btn = document.getElementById('submitQueryBtn');

      if (!subject || !message) {
        msgEl.innerHTML = '<span style="color:#f87171;">⚠️ Please fill in both subject and message.</span>';
        return;
      }
      if (!currentStudentId) {
        msgEl.innerHTML = '<span style="color:#f87171;">⚠️ Student data not loaded. Refresh and try again.</span>';
        return;
      }

      msgEl.innerHTML = '<span style="color:#f8fafc;"><i class="fa-solid fa-spinner fa-spin"></i> Submitting...</span>';
      btn.disabled = true;

      let attachment_url = null;
      if (attachmentInput.files && attachmentInput.files[0]) {
        const formData = new FormData();
        formData.append('receipt', attachmentInput.files[0]);
        try {
          const uploadRes = await apiFetch('/api/upload/receipt', {
            method: 'POST',
            body: formData,
            // don't set Content-Type header, let browser set boundary
          }, false); // don't stringify body
          if (uploadRes.success) {
            attachment_url = uploadRes.receipt_url;
          } else {
            msgEl.innerHTML = `<span style="color:#f87171;">❌ Upload failed: ${uploadRes.message}</span>`;
            btn.disabled = false;
            return;
          }
        } catch (e) {
          msgEl.innerHTML = '<span style="color:#f87171;">❌ Upload error. Try again.</span>';
          btn.disabled = false;
          return;
        }
      }

      try {
        const res = await apiFetch('/api/queries/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ student_id: currentStudentId, subject, message, attachment_url })
        });
        if (res.success) {
          msgEl.innerHTML = '<span style="color:#4ade80;">✅ Query submitted! Admin will respond soon.</span>';
          document.getElementById('querySubject').value = '';
          document.getElementById('queryMessage').value = '';
          document.getElementById('queryAttachment').value = '';
          loadMyQueries(currentStudentId);
        } else {
          msgEl.innerHTML = `<span style="color:#f87171;">❌ ${res.message}</span>`;
        }
      } catch (e) {
        msgEl.innerHTML = '<span style="color:#f87171;">❌ Error submitting query. Try again.</span>';
      }
      btn.disabled = false;
    }

    async function loadMyQueries(studentId) {
      try {
        const res = await apiFetch(`/api/queries/student/${studentId}`);
        const el = document.getElementById('myQueriesList');
        if (res.success && res.queries.length > 0) {
          el.innerHTML = res.queries.map(q => `
            <div class="query-item">
              <div class="q-subject">${escapeHtml(q.subject)}</div>
              <div class="q-message">${escapeHtml(q.message)}</div>
              ${q.attachment_url ? `<div style="margin-bottom:8px;"><a href="${q.attachment_url}" target="_blank" style="color:#60a5fa; font-size:0.85rem; text-decoration:none;"><i class="fa-solid fa-paperclip"></i> View Attachment</a></div>` : ''}
              <div class="q-meta">
                <span class="q-status ${q.status}">${q.status === 'in_progress' ? '🔄 In Progress' : q.status === 'resolved' ? '✅ Resolved' : '🔴 Open'}</span>
                <span class="q-date">${new Date(q.created_at).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' })}</span>
              </div>
              ${q.admin_reply ? `<div class="q-reply"><div class="q-reply-label">📣 Admin Reply</div>${escapeHtml(q.admin_reply)}</div>` : ''}
            </div>
          `).join('');
        } else {
          el.innerHTML = `<div class="empty-state"><i class="fa-solid fa-inbox"></i><p>No queries submitted yet.</p></div>`;
        }
      } catch(e) { console.error(e); }
    }
  </script>
</body>
