<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Bus — College Bus Management</title>
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/style.css?v=8">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
.page-content { padding:24px 28px 40px 28px; flex:1; }
    .page-content h2 { font-size:1.25rem; font-weight:700; color:#f1f5f9; display:flex; align-items:center; gap:10px; margin-bottom:24px; }
    .page-content h2 i { color:var(--clr-accent); }
    .form-card { background:var(--clr-surface); border:1px solid var(--clr-border); border-radius:var(--radius-lg); padding:28px; max-width:640px; margin:0 auto; }
    .form-card label { display:block; color:var(--clr-muted); font-size:0.82rem; font-weight:500; margin-bottom:5px; }
    .form-card input, .form-card select, .form-card textarea { width:100%; padding:11px 14px; margin-bottom:16px; border-radius:var(--radius-sm); border:1px solid var(--clr-border-strong); background:var(--clr-surface-2); color:#e2e8f0; font-family:inherit; font-size:0.9rem; outline:none; transition:border-color var(--transition); }
    .form-card input:focus, .form-card select:focus, .form-card textarea:focus { border-color:var(--clr-accent); }
    .form-card .btn-submit { width:100%; padding:12px; border:none; border-radius:var(--radius-sm); background:linear-gradient(135deg,var(--clr-accent),#f97316); color:#000; font-weight:700; font-size:0.92rem; cursor:pointer; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:8px; transition:filter var(--transition); }
    .form-card .btn-submit:hover { filter:brightness(1.1); }
    .form-card .msg { margin-top:14px; text-align:center; font-weight:500; font-size:0.88rem; }

    @media (max-width:768px) {
      .sidebar { position:fixed; left:-280px; z-index:200; transition:left var(--transition); width:260px; min-width:260px; }
      .sidebar.mobile-open { left:0; }
      .sidebar.collapsed { left:-280px; }
      .main-wrap { margin-left:0 !important; }
      .page-content { padding:16px; }
      .topbar { padding:0 16px; }
      .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:150; }
      .sidebar-overlay.show { display:block; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <script>if(localStorage.getItem('sidebar_collapsed')==='true' && window.innerWidth > 768) document.getElementById('sidebar').classList.add('collapsed');</script>
      <div class="sidebar-brand">
        <div class="brand-icon"><i class="fa-solid fa-bus"></i></div>
        <div class="brand-text"><h3>BusAdmin</h3><span>Management Panel</span></div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">Main Menu</div>
        <a href="dashboard.html"><i class="fa-solid fa-gauge"></i> <span>Dashboard</span></a>
        <div class="nav-section">Directory</div>
        <a href="view_buses.html" class="active"><i class="fa-solid fa-bus"></i> <span>Buses</span></a>
        <a href="view_drivers.html"><i class="fa-solid fa-id-card"></i> <span>Drivers</span></a>
        <a href="view_students.html"><i class="fa-solid fa-user-graduate"></i> <span>Students</span></a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-mini"><div class="avatar"><i class="fa-solid fa-user-shield"></i></div><div class="user-info"><strong>Admin</strong><small>Super Admin</small></div></div>
        <button class="btn-logout" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> <span>Logout</span></button>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMobileSidebar()"></div>
    <div class="main-wrap">
      <header class="topbar">
        <div class="topbar-left"><button class="btn-sidebar-toggle" id="btnSidebarToggle"><i class="fa-solid fa-bars"></i></button><span class="page-title">Add New Bus</span></div>
        <div class="topbar-right"><div class="header-date" id="headerDate"></div><button class="btn-icon" id="btnThemeToggle"><i class="fa-solid fa-moon"></i></button></div>
      </header>
      <div class="page-content">
        <h2><i class="fa-solid fa-plus-circle"></i> Add New Bus</h2>
        <div class="form-card">
          <form id="busForm">
            <label>Bus Number</label>
            <input type="text" id="bus_number" placeholder="e.g. MH-09-GJ-4392" required pattern="[A-Za-z0-9- ]+" title="Letters, numbers, spaces, and hyphens only">
            <label>Short Bus Name</label>
            <input type="text" id="short_name" placeholder="e.g. 4392">
            <label>Assign Driver</label>
            <select id="driver_id"><option value="">-- Select Driver (optional) --</option></select>
            <label>Capacity</label>
            <input type="number" id="capacity" placeholder="Number of seats" min="0">
            <label>Route</label>
            <input type="text" id="route" placeholder="e.g. North Campus">
            <button type="submit" class="btn-submit"><i class="fa-solid fa-plus"></i> Add Bus</button>
          </form>
          <div id="msg" class="msg" style="color:var(--clr-green);"></div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/script.js?v=6"></script>
  <script>
    const sidebar=document.getElementById('sidebar'),btnToggle=document.getElementById('btnSidebarToggle'),overlay=document.getElementById('sidebarOverlay');
    btnToggle.addEventListener('click',()=>{if(window.innerWidth<=768){sidebar.classList.toggle('mobile-open');overlay.classList.toggle('show');}else{sidebar.classList.toggle('collapsed'); localStorage.setItem('sidebar_collapsed', sidebar.classList.contains('collapsed'));}});
    function closeMobileSidebar(){sidebar.classList.remove('mobile-open');overlay.classList.remove('show');}
    document.querySelectorAll('.sidebar-nav a').forEach(l=>l.addEventListener('click',()=>{if(window.innerWidth<=768)closeMobileSidebar();}));
    const btnTheme=document.getElementById('btnThemeToggle'),savedTheme=localStorage.getItem('theme');
    if(savedTheme==='light'){document.body.classList.add('light-theme');btnTheme.innerHTML='<i class="fa-solid fa-sun"></i>';}
    btnTheme.addEventListener('click',()=>{document.body.classList.toggle('light-theme');const il=document.body.classList.contains('light-theme');localStorage.setItem('theme',il?'light':'dark');btnTheme.innerHTML=il?'<i class="fa-solid fa-sun"></i>':'<i class="fa-solid fa-moon"></i>';});
    (function(){const n=new Date();document.getElementById('headerDate').innerHTML=`<strong>${n.toLocaleDateString('en-IN',{weekday:'long'})}</strong>${n.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}`;})();
  </script>
</body>
</html>
