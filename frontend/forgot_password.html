<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGI Bus System - Student Password Reset</title>
  <link rel="stylesheet" href="css/style.css?v=4">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --primary-color: #ffb703;
      --secondary-color: #fb8500;
      --dark-bg: #023047;
      --glass-bg: rgba(2, 48, 71, 0.6);
      --text-light: #ffffff;
    }
    
    body.login-page {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, var(--dark-bg), #0f172a, #1e293b);
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Animated Background Particles */
    .bg-particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .particle {
      position: absolute;
      display: block;
      list-style: none;
      width: 20px;
      height: 20px;
      background: rgba(255, 183, 3, 0.15);
      border-radius: 50%;
      animation: floatUp 25s linear infinite;
      bottom: -150px;
    }

    .particle:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
    .particle:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
    .particle:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
    .particle:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
    .particle:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0; }
      100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
    }

    /* Premium Glassmorphism Card */
    .login-container {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 50px 40px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: popIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.9) translateY(30px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .logo-container {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      border-radius: 20px;
      transform: rotate(-10deg);
      margin-bottom: 20px;
      box-shadow: 0 10px 20px rgba(255, 183, 3, 0.3);
      transition: 0.3s;
    }

    .logo-badge i {
      font-size: 40px;
      color: white;
      transform: rotate(10deg);
    }

    .login-container h1 {
      color: var(--text-light);
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .login-container p {
      color: rgba(255, 255, 255, 0.7);
      margin-top: 8px;
      font-size: 14px;
      font-weight: 300;
    }

    .input-group {
      position: relative;
      margin-bottom: 25px;
    }

    .input-group i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.5);
      transition: 0.3s;
      z-index: 2;
    }

    .input-group input {
      width: 100%;
      padding: 16px 16px 16px 50px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }

    .input-group input:focus {
      background: rgba(0, 0, 0, 0.4);
      border-color: var(--primary-color);
      box-shadow: 0 0 0 4px rgba(255, 183, 3, 0.1);
    }

    .input-group input:focus + i {
      color: var(--primary-color);
    }

    .login-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(255, 183, 3, 0.3);
      text-transform: uppercase;
      font-family: inherit;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .login-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 25px rgba(255, 183, 3, 0.4);
    }

    .forgot-links {
      display: flex;
      justify-content: center;
      margin-top: 20px;
      font-size: 13px;
    }

    .forgot-links a {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      transition: 0.3s;
    }

    .forgot-links a:hover {
      color: var(--primary-color);
    }

    .message {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
    }
  </style>
</head>
<body class="login-page">

  <ul class="bg-particles">
    <li class="particle"></li>
    <li class="particle"></li>
    <li class="particle"></li>
    <li class="particle"></li>
    <li class="particle"></li>
  </ul>

  <div class="login-container">
    <div class="logo-container">
      <div class="logo-badge">
        <i class="fa-solid fa-key"></i>
      </div>
      <h1>Password Recovery</h1>
      <p>Student Portal Reset</p>
    </div>

    <!-- Step 1: Email Request -->
    <form id="studentResetForm" class="reset-step" data-step="1">
      <div class="input-group">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="student_email" placeholder="Registered Email Address" required>
      </div>
      <button type="submit" class="login-btn">
        Send Reset Code <i class="fa-solid fa-paper-plane"></i>
      </button>
      <div class="forgot-links">
        <a href="login.html"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>
      </div>
    </form>

    <!-- Step 2: Verification & New Password -->
    <form id="studentResetTokenForm" class="reset-step" data-step="2" style="display: none;">
      <div class="input-group">
        <i class="fa-solid fa-hashtag"></i>
        <input type="text" id="reset_token" placeholder="6-digit Reset Code" required>
      </div>
      <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="new_password" placeholder="New Password" required minlength="6">
      </div>
      <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="confirm_password" placeholder="Confirm Password" required minlength="6">
      </div>
      <button type="submit" class="login-btn">
        Set New Password <i class="fa-solid fa-check"></i>
      </button>
      <div class="forgot-links">
        <a href="forgot_password.html">Didn't get code? Request again</a>
      </div>
    </form>

    <div id="studentResetMsg" class="message"></div>
  </div>

  <script src="js/script.js?v=4"></script>
</body>
</html>
