<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Students — College Bus Management</title>
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/style.css?v=8">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
.page-content {
      padding: 24px 28px 40px 28px;
      flex: 1;
    }

    .panel {
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .panel-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--clr-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .panel-header h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-header h3 i {
      color: var(--clr-accent);
    }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--clr-border);
      align-items: center;
      background: var(--clr-surface-2);
    }

    .search-box {
      position: relative;
      flex: 1;
      min-width: 200px;
    }

    .search-box i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--clr-muted);
      font-size: 0.85rem;
    }

    .search-box input {
      width: 100%;
      padding: 9px 14px 9px 38px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--clr-border-strong);
      background: var(--clr-surface);
      color: #e2e8f0;
      font-family: inherit;
      font-size: 0.82rem;
      outline: none;
      transition: border-color var(--transition);
    }

    .search-box input:focus {
      border-color: var(--clr-accent);
    }

    .filter-select {
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--clr-border-strong);
      background: var(--clr-surface);
      color: #cbd5e1;
      font-family: inherit;
      font-size: 0.78rem;
      cursor: pointer;
      outline: none;
      min-width: 130px;
    }

    .filter-select:focus {
      border-color: var(--clr-accent);
    }

    .panel-body {
      padding: 0;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--clr-border-strong);
    }

    table th {
      background: var(--clr-surface-2);
      color: var(--clr-muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
      padding: 10px 12px;
      text-align: center;
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 2;
      border: 1px solid var(--clr-border-strong);
    }

    table td {
      padding: 10px 12px;
      border: 1px solid var(--clr-border-strong);
      font-size: 0.82rem;
      color: #cbd5e1;
      text-align: center;
    }

    table th:first-child,
    table td:first-child {
      text-align: left;
    }

    table tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    table a {
      color: var(--clr-accent);
      text-decoration: none;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    table a:hover {
      text-decoration: underline;
    }

    .overdue-row td:first-child {
      border-left: 3px solid var(--clr-red);
    }

    .tag {
      display: inline-block;
      padding: 3px 8px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 4px;
      font-size: 0.72rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .amt-paid {
      color: #34d399;
      font-weight: 600;
    }

    .amt-due {
      color: #f87171;
      font-weight: 700;
    }

    .btn-pay {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border-radius: 6px;
      border: none;
      background: linear-gradient(135deg, var(--clr-green), #059669);
      color: #fff;
      font-weight: 700;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: inherit;
      transition: filter var(--transition);
    }

    .btn-pay:hover {
      filter: brightness(1.15);
    }

    /* ── Mobile Responsive ── */
    

    /* ── Student Card (mobile) ── */
    .student-card { background: var(--clr-surface); border: 1px solid var(--clr-border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 16px; width: 100%; display: flex; flex-direction: column; gap: 12px; position: relative; }

    .student-card.overdue {
      border-left: 4px solid var(--clr-red);
    }

    .student-card .sc-name {
      font-weight: 700;
      font-size: 0.95rem;
      color: #f1f5f9;
      margin-bottom: 2px;
    }

    .student-card .sc-roll {
      font-size: 0.75rem;
      color: var(--clr-muted);
      font-family: monospace;
      margin-bottom: 10px;
    }

    .student-card .sc-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .student-card .sc-label {
      color: var(--clr-muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 2px;
    }

    .student-card .sc-val {
      color: #cbd5e1;
      font-size: 0.82rem;
    }

    .student-card .sc-dept {
      display: inline-block;
      padding: 3px 8px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 5px;
      font-size: 0.74rem;
      color: #cbd5e1;
      margin-bottom: 8px;
    }

    .student-card .sc-fees-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin: 10px 0;
    }

    .student-card .sc-fee-box {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 8px;
      padding: 8px 10px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .student-card .sc-fee-box .sc-fee-label {
      font-size: 0.66rem;
      color: var(--clr-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 3px;
    }

    .student-card .sc-fee-box .sc-fee-val {
      font-weight: 700;
      font-size: 0.82rem;
    }

    .student-card .sc-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .student-card .sc-actions button {
      flex: 1;
      min-width: 80px;
      padding: 8px 10px;
      border-radius: 6px;
      border: none;
      font-weight: 700;
      font-size: 0.76rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <script>if (localStorage.getItem('sidebar_collapsed') === 'true' && window.innerWidth > 768) document.getElementById('sidebar').classList.add('collapsed');</script>
      <div class="sidebar-brand">
        <div class="brand-icon"><i class="fa-solid fa-bus"></i></div>
        <div class="brand-text">
          <h3>BusAdmin</h3><span>Management Panel</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">Main Menu</div>
        <a href="dashboard.html"><i class="fa-solid fa-gauge"></i> <span>Dashboard</span></a>
        <div class="nav-section">Directory</div>
        <a href="view_buses.html"><i class="fa-solid fa-bus"></i> <span>Buses</span></a>
        <a href="view_drivers.html"><i class="fa-solid fa-id-card"></i> <span>Drivers</span></a>
        <a href="view_students.html" class="active"><i class="fa-solid fa-user-graduate"></i> <span>Students</span></a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-mini">
          <div class="avatar"><i class="fa-solid fa-user-shield"></i></div>
          <div class="user-info"><strong>Admin</strong><small>Super Admin</small></div>
        </div>
        <button class="btn-logout" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i>
          <span>Logout</span></button>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMobileSidebar()"></div>
    <div class="main-wrap">
      <header class="topbar">
        <div class="topbar-left"><button class="btn-sidebar-toggle" id="btnSidebarToggle"><i
              class="fa-solid fa-bars"></i></button><span class="page-title">All Students</span></div>
        <div class="topbar-right"><button class="btn-icon" id="btnThemeToggle"><i class="fa-solid fa-moon"></i></button>
        </div>
      </header>
      <div class="page-content">
        <div class="panel">
          <div class="sticky-table-controls">
            <div class="panel-header">
              <h3><i class="fa-solid fa-user-graduate"></i> Student Directory</h3>
              <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                <button onclick="window.location.href='add_student.html'"
                  style="display:flex; align-items:center; gap:8px; padding:8px 16px; border-radius:6px; border:none; background:linear-gradient(135deg,var(--clr-accent),#fbbf24); color:#000; font-weight:600; cursor:pointer; font-family:inherit;"><i
                    class="fa-solid fa-plus-circle"></i> Add Student</button>
                <button onclick="window.location.href='bulk_upload.html'"
                  style="display:flex; align-items:center; gap:8px; padding:8px 16px; border-radius:6px; border:none; background:linear-gradient(135deg,#10b981,#059669); color:#fff; font-weight:600; cursor:pointer; font-family:inherit;"><i
                    class="fa-solid fa-file-excel"></i> Bulk Upload</button>
                
                <!-- Standard Downloads -->
                <button onclick="downloadStudentPDF()"
                  style="display:flex; align-items:center; gap:8px; padding:8px 16px; border-radius:6px; border:none; background:linear-gradient(135deg,#ef4444,#b91c1c); color:#fff; font-weight:600; cursor:pointer; font-family:inherit;" title="Standard PDF Export"><i
                    class="fa-solid fa-file-pdf"></i> PDF</button>
                <button onclick="downloadStudentExcel()"
                  style="display:flex; align-items:center; gap:8px; padding:8px 16px; border-radius:6px; border:none; background:linear-gradient(135deg,#10b981,#059669); color:#fff; font-weight:600; cursor:pointer; font-family:inherit;" title="Standard Excel Export"><i
                    class="fa-solid fa-file-excel"></i> Excel</button>
                    
                <!-- Full A-Z Downloads -->
                <button onclick="downloadFullStudentPDF()"
                  style="display:flex; align-items:center; gap:8px; padding:8px 16px; border-radius:6px; border:none; background:linear-gradient(135deg,#7f1d1d,#450a0a); color:#fff; font-weight:600; cursor:pointer; font-family:inherit;" title="Full A-Z Report PDF"><i
                    class="fa-solid fa-file-pdf"></i> Full PDF</button>
                <button onclick="downloadFullStudentExcel()"
                  style="display:flex; align-items:center; gap:8px; padding:8px 16px; border-radius:6px; border:none; background:linear-gradient(135deg,#064e3b,#022c22); color:#fff; font-weight:600; cursor:pointer; font-family:inherit;" title="Full A-Z Report Excel"><i
                    class="fa-solid fa-file-excel"></i> Full Excel</button>

                <button onclick="bulkResetPasswords()"
                  style="display:flex; align-items:center; gap:8px; padding:8px 16px; border-radius:6px; border:none; background:linear-gradient(135deg,#8b5cf6,#6d28d9); color:#fff; font-weight:600; cursor:pointer; font-family:inherit;"><i
                    class="fa-solid fa-key"></i> Bulk Reset</button>
              </div>
            </div>
            <div class="filter-bar" style="margin-bottom: 0;">
              <div class="search-box"><i class="fa-solid fa-search"></i><input type="text" id="searchStudent"
                  placeholder="Search name..." oninput="loadStudents()"></div>
              <select class="filter-select" id="filterClass" onchange="loadStudents()">
                <option value="">All Classes</option>
              </select>
              <select class="filter-select" id="filterBus" onchange="loadStudents()">
                <option value="">All Buses</option>
              </select>
              <select class="filter-select" id="filterPickup" onchange="loadStudents()">
                <option value="">All Routes</option>
              </select>
              <select class="filter-select" id="filterStatus" onchange="loadStudents()">
                <option value="">All Students</option>
                <option value="active" selected>Active Only</option>
                <option value="passout">Passout / Pending Fees</option>
              </select>
            </div>
          </div>
          <div class="panel-body">
            <!-- Desktop: scrollable table -->
            <div class="desktop-table" id="studentTableScroll" style="overflow-x:auto; overflow-y:auto; max-height:calc(100vh - 260px); position:relative;">
              <table id="studentsTable" style="font-size:0.78rem;">
                <thead style="position:sticky; top:0; z-index:6; background:var(--clr-surface, #1e293b);">
                  <tr id="studentTableHeaderRow">
                    <th onclick="setStudentSort('id')" style="cursor:pointer; padding:6px 8px; white-space:nowrap;"># <i class="fa-solid fa-sort"
                        style="font-size:0.65rem;color:var(--clr-muted);"></i></th>
                    <th onclick="setStudentSort('name')" style="cursor:pointer; padding:6px 8px;">Name <i class="fa-solid fa-sort"
                        style="font-size:0.65rem;color:var(--clr-muted);"></i></th>
                    <th onclick="setStudentSort('class_name')" style="cursor:pointer; padding:6px 8px;">Class <i class="fa-solid fa-sort"
                        style="font-size:0.65rem;color:var(--clr-muted);"></i></th>
                    <th onclick="setStudentSort('bus_number')" style="cursor:pointer; padding:6px 8px;">Bus <i
                        class="fa-solid fa-sort" style="font-size:0.65rem;color:var(--clr-muted);"></i></th>
                    <th onclick="setStudentSort('pick_up_point')" style="cursor:pointer; padding:6px 8px;">Route <i
                        class="fa-solid fa-sort" style="font-size:0.65rem;color:var(--clr-muted);"></i></th>
                    <th onclick="setStudentSort('old_bus_fees')" style="cursor:pointer; padding:6px 8px;"
                      title="Old Fees (Legacy)">Old<br>Fees <i class="fa-solid fa-sort"
                        style="font-size:0.65rem;color:var(--clr-muted);"></i></th>
                    <!-- Dynamic FY Columns will be injected here via JS -->
                    <th id="currentFeesHeader" onclick="setStudentSort('current_fees')" style="cursor:pointer; padding:6px 8px;" title="26-27 Fees (Apr 2026 - Mar 2027)">
                      26-27<br>Fees <i class="fa-solid fa-sort"
                        style="font-size:0.65rem;color:var(--clr-muted);"></i></th>
                    <th onclick="setStudentSort('total_fees')" style="cursor:pointer; padding:6px 8px;" title="Total Fees">Total<br>Fees <i
                        class="fa-solid fa-sort" style="font-size:0.65rem;color:var(--clr-muted);"></i></th>
                    <th onclick="setStudentSort('discount_amount')" style="cursor:pointer; padding:6px 8px;" title="Concession Amount">
                      Conc. <i class="fa-solid fa-sort" style="font-size:0.65rem;color:var(--clr-muted);"></i></th>
                    <th onclick="setStudentSort('fees_paid')" style="cursor:pointer; padding:6px 8px;" title="Paid Fees">Paid <i
                        class="fa-solid fa-sort" style="font-size:0.65rem;color:var(--clr-muted);"></i></th>
                    <th onclick="setStudentSort('remaining_fees')" style="cursor:pointer; padding:6px 8px;" title="Remaining Fees">Rem.<br>Fees <i class="fa-solid fa-sort"
                        style="font-size:0.65rem;color:var(--clr-muted);"></i></th>
                    <th style="padding:6px 8px;">Action</th>
                  </tr>
                </thead>
                <tbody></tbody>
                <tfoot id="tableFooter"
                  style="position: sticky; bottom: 0; background: var(--clr-surface, #1e293b); box-shadow: 0 -4px 10px rgba(0,0,0,0.15); display: none; z-index: 5;">
                  <tr>
                    <td colspan="5" style="text-align: right; font-weight: 700; color: var(--clr-accent, #f59e0b); padding:6px 8px; font-size:0.78rem;">
                      Totals:</td>
                    <td style="font-weight: 700; color: #f8fafc; padding:6px 8px;" id="footOldFees">₹0</td>
                    <td style="font-weight: 700; color: #f8fafc; padding:6px 8px;" id="footCurrentFees">₹0</td>
                    <td style="font-weight: 700; color: #f8fafc; padding:6px 8px;" id="footTotalFees">₹0</td>
                    <td style="font-weight: 700; color: #f8fafc; padding:6px 8px;" id="footDiscount">₹0</td>
                    <td style="font-weight: 700; color: var(--success, #10b981); padding:6px 8px;" id="footPaidFees">₹0</td>
                    <td style="font-weight: 700; color: var(--error, #ef4444); padding:6px 8px;" id="footRemainingFees">₹0</td>
                    <td></td>
                  </tr>
                </tfoot>
              </table>
            </div>
            <!-- Mobile: card layout -->
            <div class="student-cards" id="studentCards"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="js/script.js?v=6"></script>
  <script>
    const sidebar = document.getElementById('sidebar'), btnToggle = document.getElementById('btnSidebarToggle'), overlay = document.getElementById('sidebarOverlay');
    btnToggle.addEventListener('click', () => { if (window.innerWidth <= 992) { sidebar.classList.toggle('mobile-open'); overlay.classList.toggle('show'); } else { sidebar.classList.toggle('collapsed'); localStorage.setItem('sidebar_collapsed', sidebar.classList.contains('collapsed')); } });
    function closeMobileSidebar() { sidebar.classList.remove('mobile-open'); overlay.classList.remove('show'); }
    document.querySelectorAll('.sidebar-nav a').forEach(l => l.addEventListener('click', () => { if (window.innerWidth <= 992) closeMobileSidebar(); }));
    const btnTheme = document.getElementById('btnThemeToggle'), savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') { document.body.classList.add('light-theme'); btnTheme.innerHTML = '<i class="fa-solid fa-sun"></i>'; }
    btnTheme.addEventListener('click', () => { document.body.classList.toggle('light-theme'); const il = document.body.classList.contains('light-theme'); localStorage.setItem('theme', il ? 'light' : 'dark'); btnTheme.innerHTML = il ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>'; });
  </script>
</body>

</html>
