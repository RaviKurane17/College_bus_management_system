<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Students — College Bus Management</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html{font-size:15px;scroll-behavior:smooth;}
    body{font-family:'Poppins','Segoe UI',system-ui,sans-serif;background:#0b1120;color:#e2e8f0;min-height:100vh;overflow-x:hidden;}
    :root{--sidebar-w:260px;--sidebar-collapsed:72px;--header-h:64px;--clr-bg:#0b1120;--clr-surface:#111a2e;--clr-surface-2:#162032;--clr-border:rgba(255,255,255,0.06);--clr-border-strong:rgba(255,255,255,0.10);--clr-text:#e2e8f0;--clr-muted:#94a3b8;--clr-accent:#f59e0b;--clr-accent-2:#3b82f6;--clr-green:#10b981;--clr-red:#ef4444;--clr-orange:#f97316;--clr-purple:#8b5cf6;--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--shadow-card:0 4px 24px rgba(0,0,0,0.30);--transition:0.25s cubic-bezier(0.4,0,0.2,1);}
    .app-shell{display:flex;min-height:100vh;}
    .sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--clr-surface);border-right:1px solid var(--clr-border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:width var(--transition),min-width var(--transition);overflow-x:hidden;}
    .sidebar.collapsed{width:var(--sidebar-collapsed);min-width:var(--sidebar-collapsed);}
    .sidebar-brand{display:flex;align-items:center;gap:12px;padding:20px 20px 18px 20px;border-bottom:1px solid var(--clr-border);white-space:nowrap;}
    .sidebar-brand .brand-icon{width:40px;height:40px;min-width:40px;background:linear-gradient(135deg,var(--clr-accent),#fbbf24);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:1.25rem;color:#000;}
    .sidebar-brand .brand-text h3{font-size:1rem;font-weight:700;color:#f1f5f9;}
    .sidebar-brand .brand-text span{font-size:0.72rem;color:var(--clr-muted);}
    .sidebar.collapsed .brand-text{display:none;}
    .sidebar-nav{flex:1;overflow-y:auto;padding:16px 12px;}
    .sidebar-nav .nav-section{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--clr-muted);padding:12px 12px 6px 12px;font-weight:600;white-space:nowrap;}
    .sidebar.collapsed .nav-section{display:none;}
    .sidebar-nav a{display:flex;align-items:center;gap:12px;padding:11px 12px;margin-bottom:2px;border-radius:var(--radius-sm);color:#cbd5e1;text-decoration:none;font-weight:500;font-size:0.88rem;transition:all var(--transition);white-space:nowrap;position:relative;}
    .sidebar-nav a i{width:20px;min-width:20px;text-align:center;font-size:1rem;}
    .sidebar-nav a:hover{background:rgba(255,255,255,0.05);color:#f1f5f9;}
    .sidebar-nav a.active{background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(245,158,11,0.05));color:var(--clr-accent);font-weight:600;box-shadow:inset 3px 0 0 var(--clr-accent);}
    .sidebar.collapsed .sidebar-nav a span:not(.badge){display:none;}
    .sidebar.collapsed .sidebar-nav a{justify-content:center;padding:12px;}
    .sidebar-footer{padding:12px;border-top:1px solid var(--clr-border);display:flex;flex-direction:column;gap:8px;}
    .sidebar-footer .user-mini{display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--radius-sm);background:var(--clr-surface-2);white-space:nowrap;}
    .sidebar-footer .user-mini .avatar{width:36px;height:36px;min-width:36px;border-radius:50%;background:linear-gradient(135deg,var(--clr-accent-2),var(--clr-purple));display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:0.85rem;}
    .sidebar-footer .user-mini .user-info strong{font-size:0.82rem;display:block;color:#f1f5f9;}
    .sidebar-footer .user-mini .user-info small{font-size:0.7rem;color:var(--clr-muted);}
    .sidebar.collapsed .user-info,.sidebar.collapsed .sidebar-footer .btn-logout span{display:none;}
    .sidebar-footer .btn-logout{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:10px;border:1px solid rgba(239,68,68,0.25);background:rgba(239,68,68,0.06);color:#f87171;border-radius:var(--radius-sm);cursor:pointer;font-weight:600;font-size:0.82rem;transition:all var(--transition);font-family:inherit;}
    .sidebar-footer .btn-logout:hover{background:rgba(239,68,68,0.18);border-color:rgba(239,68,68,0.45);}
    .main-wrap{flex:1;margin-left:var(--sidebar-w);transition:margin-left var(--transition);min-height:100vh;display:flex;flex-direction:column;}
    .sidebar.collapsed~.main-wrap{margin-left:var(--sidebar-collapsed);}
    .topbar{position:sticky;top:0;z-index:50;background:rgba(11,17,32,0.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--clr-border);padding:0 28px;height:var(--header-h);display:flex;align-items:center;justify-content:space-between;gap:16px;}
    .topbar-left{display:flex;align-items:center;gap:14px;}
    .btn-sidebar-toggle{width:36px;height:36px;border-radius:var(--radius-sm);background:var(--clr-surface-2);border:1px solid var(--clr-border-strong);color:var(--clr-muted);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all var(--transition);}
    .btn-sidebar-toggle:hover{color:#f1f5f9;border-color:rgba(255,255,255,0.2);}
    .topbar-left .page-title{font-size:1.15rem;font-weight:700;color:#f1f5f9;}
    .topbar-right{display:flex;align-items:center;gap:12px;}
    .btn-icon{width:38px;height:38px;border-radius:50%;background:var(--clr-surface-2);border:1px solid var(--clr-border-strong);color:var(--clr-muted);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all var(--transition);}
    .btn-icon:hover{color:#f1f5f9;background:rgba(255,255,255,0.06);}
    .page-content{padding:24px 28px 40px 28px;flex:1;}
    .panel{background:var(--clr-surface);border:1px solid var(--clr-border);border-radius:var(--radius-lg);overflow:hidden;}
    .panel-header{padding:18px 24px;border-bottom:1px solid var(--clr-border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .panel-header h3{font-size:1.05rem;font-weight:700;color:#f1f5f9;display:flex;align-items:center;gap:8px;}
    .panel-header h3 i{color:var(--clr-accent);}
    .filter-bar{display:flex;flex-wrap:wrap;gap:10px;padding:14px 24px;border-bottom:1px solid var(--clr-border);align-items:center;background:var(--clr-surface-2);}
    .search-box{position:relative;flex:1;min-width:200px;}
    .search-box i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--clr-muted);font-size:0.85rem;}
    .search-box input{width:100%;padding:9px 14px 9px 38px;border-radius:var(--radius-sm);border:1px solid var(--clr-border-strong);background:var(--clr-surface);color:#e2e8f0;font-family:inherit;font-size:0.82rem;outline:none;transition:border-color var(--transition);}
    .search-box input:focus{border-color:var(--clr-accent);}
    .filter-select{padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--clr-border-strong);background:var(--clr-surface);color:#cbd5e1;font-family:inherit;font-size:0.78rem;cursor:pointer;outline:none;min-width:130px;}
    .filter-select:focus{border-color:var(--clr-accent);}
    .panel-body{padding:0;overflow-x:auto;}
    table{width:100%;border-collapse:collapse;}
    table th{background:var(--clr-surface-2);color:var(--clr-muted);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.05em;font-weight:600;padding:10px 12px;text-align:left;white-space:nowrap;position:sticky;top:0;z-index:2;}
    table td{padding:10px 12px;border-bottom:1px solid var(--clr-border);font-size:0.82rem;color:#cbd5e1;}
    table tr:hover td{background:rgba(255,255,255,0.02);}
    table a{color:var(--clr-accent);text-decoration:none;font-weight:600;display:flex;align-items:center;gap:8px;}
    table a:hover{text-decoration:underline;}
    .overdue-row td:first-child{border-left:3px solid var(--clr-red);}
    .tag{display:inline-block;padding:3px 8px;background:rgba(255,255,255,0.06);border-radius:4px;font-size:0.72rem;border:1px solid rgba(255,255,255,0.06);}
    .amt-paid{color:#34d399;font-weight:600;}
    .amt-due{color:#f87171;font-weight:700;}
    .btn-pay{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:6px;border:none;background:linear-gradient(135deg,var(--clr-green),#059669);color:#fff;font-weight:700;font-size:0.78rem;cursor:pointer;font-family:inherit;transition:filter var(--transition);}
    .btn-pay:hover{filter:brightness(1.15);}
    body.light-theme{--clr-bg:#f1f5f9;--clr-surface:#ffffff;--clr-surface-2:#f8fafc;--clr-border:rgba(0,0,0,0.06);--clr-border-strong:rgba(0,0,0,0.10);--clr-text:#0f172a;--clr-muted:#64748b;}
    body.light-theme .topbar{background:rgba(255,255,255,0.85);border-bottom:1px solid #e2e8f0;}
    body.light-theme .sidebar{background:#fff;border-right:1px solid #e2e8f0;}
    body.light-theme .sidebar-nav a{color:#475569;}
    body.light-theme .sidebar-nav a:hover{background:#f1f5f9;}
    body.light-theme .sidebar-nav a.active{color:#b45309;background:#fffbeb;box-shadow:inset 3px 0 0 #f59e0b;}
    body.light-theme .sidebar-footer .user-mini{background:#f1f5f9;}
    body.light-theme .panel{background:#fff;border-color:#e2e8f0;}
    body.light-theme .filter-bar{background:#f8fafc;}
    body.light-theme table th{background:#f1f5f9;color:#475569;}
    body.light-theme table td{color:#334155;border-bottom-color:#e2e8f0;}
    body.light-theme .search-box input,.filter-select{background:#f8fafc;border-color:#cbd5e1;color:#0f172a;}
    body.light-theme .panel-header h3{color:#0f172a;}
    /* ── Mobile Responsive ── */
    @media(max-width:768px){
      .sidebar{position:fixed;left:-280px;z-index:200;transition:left var(--transition);width:260px;min-width:260px;}
      .sidebar.mobile-open{left:0;}.sidebar.collapsed{left:-280px;}
      .main-wrap{margin-left:0!important;}
      .page-content{padding:12px;}.topbar{padding:0 12px;}
      .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150;}
      .sidebar-overlay.show{display:block;}
      .filter-bar{flex-direction:column;align-items:stretch;padding:12px;}
      .filter-select{min-width:auto;width:100%;}
      .search-box{min-width:unset;}
      /* Hide desktop table, show cards */
      .desktop-table{display:none;}
      .student-cards{display:flex;flex-direction:column;gap:12px;padding:12px;}
      /* Panel header buttons stack on small screens */
      .panel-header{flex-direction:column;align-items:flex-start;gap:10px;}
      .panel-header>div{flex-wrap:wrap;}
      .topbar-left .page-title{font-size:1rem;}
    }
    @media(min-width:769px){
      /* On desktop, cards are hidden */
      .student-cards{display:none;}
      .desktop-table{display:block;}
    }

    /* ── Student Card (mobile) ── */
    .student-card{
      background:var(--clr-surface-2);
      border:1px solid var(--clr-border-strong);
      border-radius:var(--radius-md);
      padding:14px;
      font-size:0.84rem;
      position:relative;
    }
    .student-card.overdue{border-left:4px solid var(--clr-red);}
    .student-card .sc-name{font-weight:700;font-size:0.95rem;color:#f1f5f9;margin-bottom:2px;}
    .student-card .sc-roll{font-size:0.75rem;color:var(--clr-muted);font-family:monospace;margin-bottom:10px;}
    .student-card .sc-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
    .student-card .sc-label{color:var(--clr-muted);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:2px;}
    .student-card .sc-val{color:#cbd5e1;font-size:0.82rem;}
    .student-card .sc-dept{display:inline-block;padding:3px 8px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.08);border-radius:5px;font-size:0.74rem;color:#cbd5e1;margin-bottom:8px;}
    .student-card .sc-fees-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0;}
    .student-card .sc-fee-box{background:rgba(255,255,255,0.04);border-radius:8px;padding:8px 10px;text-align:center;border:1px solid rgba(255,255,255,0.06);}
    .student-card .sc-fee-box .sc-fee-label{font-size:0.66rem;color:var(--clr-muted);text-transform:uppercase;letter-spacing:0.03em;margin-bottom:3px;}
    .student-card .sc-fee-box .sc-fee-val{font-weight:700;font-size:0.82rem;}
    .student-card .sc-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
    .student-card .sc-actions button{flex:1;min-width:80px;padding:8px 10px;border-radius:6px;border:none;font-weight:700;font-size:0.76rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;}
    body.light-theme .student-card{background:#f8fafc;border-color:#e2e8f0;}
    body.light-theme .student-card .sc-name{color:#0f172a;}
    body.light-theme .student-card .sc-val{color:#334155;}
    body.light-theme .student-card .sc-dept{background:#f1f5f9;border-color:#e2e8f0;color:#334155;}
    body.light-theme .student-card .sc-fee-box{background:#f1f5f9;border-color:#e2e8f0;}
    
  </style>
</head>
<body>
<div class="app-shell">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand"><div class="brand-icon"><i class="fa-solid fa-bus"></i></div><div class="brand-text"><h3>BusAdmin</h3><span>Management Panel</span></div></div>
  <nav class="sidebar-nav">
    <div class="nav-section">Main Menu</div>
    <a href="dashboard.html">
      <i class="fa-solid fa-gauge"></i> <span>Dashboard</span>
    </a>
    <div class="nav-section">Buses & Drivers</div>
    <a href="add_bus.html"><i class="fa-solid fa-plus-circle"></i> <span>Add Bus</span></a>
    <a href="view_buses.html"><i class="fa-solid fa-list-check"></i> <span>View Buses</span></a>
    <a href="add_driver.html"><i class="fa-solid fa-id-card"></i> <span>Add Driver</span></a>
    <a href="view_drivers.html"><i class="fa-solid fa-users-gear"></i> <span>View Drivers</span></a>
    <div class="nav-section">Students</div>
    <a href="add_student.html"><i class="fa-solid fa-user-plus"></i> <span>Add Student</span></a>
    <a href="bulk_upload.html"><i class="fa-solid fa-file-excel"></i> <span>Bulk Upload</span></a>
    <a href="view_students.html" class="active"><i class="fa-solid fa-users"></i> <span>View Students</span></a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-mini"><div class="avatar"><i class="fa-solid fa-user-shield"></i></div><div class="user-info"><strong>Admin</strong><small>Super Admin</small></div></div>
    <button class="btn-logout" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> <span>Logout</span></button>
  </div>
</aside>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMobileSidebar()"></div>
<div class="main-wrap">
<header class="topbar">
  <div class="topbar-left"><button class="btn-sidebar-toggle" id="btnSidebarToggle"><i class="fa-solid fa-bars"></i></button><span class="page-title">All Students</span></div>
  <div class="topbar-right"><button class="btn-icon" id="btnThemeToggle"><i class="fa-solid fa-moon"></i></button></div>
</header>
<div class="page-content">
  <div class="panel">
    <div class="panel-header">
      <h3><i class="fa-solid fa-user-graduate"></i> Student Directory</h3>
      <div style="display:flex; gap:10px; align-items:center;">
        <button onclick="window.location.href='bulk_upload.html'" style="display:flex; align-items:center; gap:8px; padding:8px 16px; border-radius:6px; border:none; background:linear-gradient(135deg,#10b981,#059669); color:#fff; font-weight:600; cursor:pointer; font-family:inherit;"><i class="fa-solid fa-file-excel"></i> Bulk Upload</button>
        <button onclick="downloadStudentPDF()" style="display:flex; align-items:center; gap:8px; padding:8px 16px; border-radius:6px; border:none; background:linear-gradient(135deg,#ef4444,#b91c1c); color:#fff; font-weight:600; cursor:pointer; font-family:inherit;"><i class="fa-solid fa-file-pdf"></i> Download PDF</button>
      </div>
    </div>
    <div class="filter-bar">
      <div class="search-box"><i class="fa-solid fa-search"></i><input type="text" id="searchStudent" placeholder="Search name or roll no..." oninput="loadStudents()"></div>
      <select class="filter-select" id="filterInst" onchange="updateDynamicFilters()">
        <option value="">All Institutions</option>
        <option value="Degree">College Degree</option>
        <option value="Polytechnic">Polytechnic</option>
        <option value="PUC">Junior College (PUC)</option>
        <option value="School">School</option>
      </select>
      <select class="filter-select" id="filterDept" onchange="loadStudents()">
        <option value="">All Departments</option>
        <option value="Degree - CSE">Degree - CSE</option>
        <option value="Degree - AIML">Degree - AIML</option>
        <option value="Degree - CIVIL">Degree - CIVIL</option>
        <option value="Degree - MECH">Degree - MECH</option>
        <option value="Degree - ELECTRICAL">Degree - ELECTRICAL</option>
        <option value="Degree - ECE">Degree - ECE</option>
        <option value="Degree - MBA">Degree - MBA</option>
        <option value="Degree - BFA">Degree - BFA</option>
        <option value="Poly - CSE">Poly - CSE</option>
        <option value="Poly - CIVIL">Poly - CIVIL</option>
        <option value="Poly - MECH">Poly - MECH</option>
        <option value="Poly - ELECTRICAL">Poly - ELECTRICAL</option>
        <option value="PUC - Science">PUC - Science</option>
        <option value="PUC - Commerce">PUC - Commerce</option>
        <option value="PUC - Arts">PUC - Arts</option>
        <option value="School - Primary">School - Primary</option>
        <option value="School - Secondary">School - Secondary</option>
        <option value="School - High School">School - High School</option>
      </select>
      <select class="filter-select" id="filterYear" onchange="loadStudents()">
        <option value="">All Years / Stds</option>
        <option value="1st Year">1st Year</option>
        <option value="2nd Year">2nd Year</option>
        <option value="3rd Year">3rd Year</option>
        <option value="4th Year">4th Year</option>
        <option value="1st Std">1st Std</option>
        <option value="2nd Std">2nd Std</option>
        <option value="3rd Std">3rd Std</option>
        <option value="4th Std">4th Std</option>
        <option value="5th Std">5th Std</option>
        <option value="6th Std">6th Std</option>
        <option value="7th Std">7th Std</option>
        <option value="8th Std">8th Std</option>
        <option value="9th Std">9th Std</option>
        <option value="10th Std">10th Std</option>
        <option value="11th Std">11th Std</option>
        <option value="12th Std">12th Std</option>
      </select>
      <select class="filter-select" id="filterSec" onchange="loadStudents()">
        <option value="">All Sections</option>
        <option value="A">Sec A</option>
        <option value="B">Sec B</option>
        <option value="C">Sec C</option>
      </select>
    </div>
    <div class="panel-body">
      <!-- Desktop: scrollable table -->
      <div class="desktop-table" style="overflow-x:auto;">
        <table id="studentsTable">
          <thead><tr><th>Name</th><th>Department</th><th>Bus No</th><th>Route</th><th>Total Fees</th><th>Concession</th><th>Paid Fees</th><th>Remaining Fees</th><th>Action</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <!-- Mobile: card layout -->
      <div class="student-cards" id="studentCards"></div>
    </div>
  </div>
</div>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="js/script.js"></script>
<script>
    const categoryData = {
      "Degree": {
        depts: ["Degree - CSE|Degree - CSE", "Degree - AIML|Degree - AIML", "Degree - CIVIL|Degree - CIVIL", "Degree - MECH|Degree - MECH", "Degree - ELECTRICAL|Degree - ELECTRICAL", "Degree - ECE|Degree - ECE", "Degree - MBA|Degree - MBA", "Degree - BFA|Degree - BFA"],
        years: ["1st Year", "2nd Year", "3rd Year", "4th Year"]
      },
      "Polytechnic": {
        depts: ["Poly - CSE|Poly - CSE", "Poly - CIVIL|Poly - CIVIL", "Poly - MECH|Poly - MECH", "Poly - ELECTRICAL|Poly - ELECTRICAL"],
        years: ["1st Year", "2nd Year", "3rd Year"]
      },
      "PUC": {
        depts: ["PUC - Science|PUC - Science", "PUC - Commerce|PUC - Commerce", "PUC - Arts|PUC - Arts"],
        years: ["11th Std", "12th Std"]
      },
      "School": {
        depts: ["School - Primary|School - Primary", "School - Secondary|School - Secondary", "School - High School|School - High School"],
        years: ["1st Std", "2nd Std", "3rd Std", "4th Std", "5th Std", "6th Std", "7th Std", "8th Std", "9th Std", "10th Std"]
      }
    };

    function updateDynamicFilters() {
      const inst = document.getElementById('filterInst').value;
      const deptSelect = document.getElementById('filterDept');
      const yearSelect = document.getElementById('filterYear');
      
      let allDepts = [];
      let allYears = [];
      
      if (inst && categoryData[inst]) {
        allDepts = categoryData[inst].depts;
        allYears = categoryData[inst].years;
      } else {
        Object.values(categoryData).forEach(cat => {
          allDepts = allDepts.concat(cat.depts);
          allYears = allYears.concat(cat.years);
        });
      }
      
      deptSelect.innerHTML = '<option value="">All Departments</option>';
      yearSelect.innerHTML = '<option value="">All Years / Stds</option>';
      
      allDepts.forEach(d => {
        const parts = d.split('|');
        deptSelect.innerHTML += `<option value="${parts[0]}">${parts[1]}</option>`;
      });
      allYears.forEach(y => {
        yearSelect.innerHTML += `<option value="${y.split(' (')[0]}">${y}</option>`;
      });
      
      loadStudents();
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      updateDynamicFilters();
    });
</script>
<script>
  const sidebar=document.getElementById('sidebar'),btnToggle=document.getElementById('btnSidebarToggle'),overlay=document.getElementById('sidebarOverlay');
  btnToggle.addEventListener('click',()=>{if(window.innerWidth<=768){sidebar.classList.toggle('mobile-open');overlay.classList.toggle('show');}else{sidebar.classList.toggle('collapsed');}});
  function closeMobileSidebar(){sidebar.classList.remove('mobile-open');overlay.classList.remove('show');}
  document.querySelectorAll('.sidebar-nav a').forEach(l=>l.addEventListener('click',()=>{if(window.innerWidth<=768)closeMobileSidebar();}));
  const btnTheme=document.getElementById('btnThemeToggle'),savedTheme=localStorage.getItem('theme');
  if(savedTheme==='light'){document.body.classList.add('light-theme');btnTheme.innerHTML='<i class="fa-solid fa-sun"></i>';}
  btnTheme.addEventListener('click',()=>{document.body.classList.toggle('light-theme');const il=document.body.classList.contains('light-theme');localStorage.setItem('theme',il?'light':'dark');btnTheme.innerHTML=il?'<i class="fa-solid fa-sun"></i>':'<i class="fa-solid fa-moon"></i>';});
</script>
</body>
