<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGI Bus System - Login</title>
  <link rel="stylesheet" href="css/style.css?v=4">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --primary-color: #ffb703;
      --secondary-color: #fb8500;
      --dark-bg: #023047;
      --glass-bg: rgba(2, 48, 71, 0.6);
      --text-light: #ffffff;
    }
    
    body.login-page {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, var(--dark-bg), #0f172a, #1e293b);
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Animated Background Particles */
    .bg-particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .particle {
      position: absolute;
      display: block;
      list-style: none;
      width: 20px;
      height: 20px;
      background: rgba(255, 183, 3, 0.15);
      border-radius: 50%;
      animation: floatUp 25s linear infinite;
      bottom: -150px;
    }

    .particle:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
    .particle:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
    .particle:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
    .particle:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
    .particle:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }
    .particle:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; }
    .particle:nth-child(7) { left: 35%; width: 150px; height: 150px; animation-delay: 7s; }
    .particle:nth-child(8) { left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s; }
    .particle:nth-child(9) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; }
    .particle:nth-child(10) { left: 85%; width: 150px; height: 150px; animation-delay: 0s; animation-duration: 11s; }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0; }
      100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
    }

    /* Premium Glassmorphism Card */
    .login-container {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 50px 40px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: popIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.9) translateY(30px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .logo-container {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      border-radius: 20px;
      transform: rotate(-10deg);
      margin-bottom: 20px;
      box-shadow: 0 10px 20px rgba(255, 183, 3, 0.3);
      transition: 0.3s;
    }

    .logo-badge:hover {
      transform: rotate(0deg) scale(1.05);
    }

    .logo-badge i {
      font-size: 40px;
      color: white;
      transform: rotate(10deg);
      transition: 0.3s;
    }
    
    .logo-badge:hover i {
      transform: rotate(0deg);
    }

    .login-container h1 {
      color: var(--text-light);
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .login-container p {
      color: rgba(255, 255, 255, 0.7);
      margin-top: 8px;
      font-size: 14px;
      font-weight: 300;
    }

    .input-group {
      position: relative;
      margin-bottom: 25px;
    }

    .input-group i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.5);
      transition: 0.3s;
      z-index: 2;
    }

    .input-group input, .input-group select {
      width: 100%;
      padding: 16px 16px 16px 50px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: all 0.3s ease;
      box-sizing: border-box;
      appearance: none;
    }

    .input-group input:focus, .input-group select:focus {
      background: rgba(0, 0, 0, 0.4);
      border-color: var(--primary-color);
      box-shadow: 0 0 0 4px rgba(255, 183, 3, 0.1);
    }

    .input-group input:focus + i, .input-group select:focus + i {
      color: var(--primary-color);
    }

    .input-group select option {
      background: var(--dark-bg);
      color: white;
    }

    /* Custom select arrow */
    .select-wrapper::after {
      content: '\f107';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.5);
      pointer-events: none;
    }

    .login-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(255, 183, 3, 0.3);
      text-transform: uppercase;
      font-family: inherit;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .login-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 25px rgba(255, 183, 3, 0.4);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .forgot-links {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      font-size: 13px;
    }

    .forgot-links a {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      transition: 0.3s;
    }

    .forgot-links a:hover {
      color: var(--primary-color);
      text-decoration: underline;
    }

    #loginMsg {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      border-radius: 8px;
    }

    /* Mobile Responsive */
    @media (max-width: 480px) {
      .login-container {
        margin: 20px;
        padding: 40px 25px;
        border-radius: 20px;
      }
      .logo-badge {
        width: 70px;
        height: 70px;
      }
      .logo-badge i {
        font-size: 32px;
      }
      .login-container h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body class="login-page">

  <!-- Animated Background -->
  <ul class="bg-particles">
    <li class="particle"></li>
    <li class="particle"></li>
    <li class="particle"></li>
    <li class="particle"></li>
    <li class="particle"></li>
    <li class="particle"></li>
    <li class="particle"></li>
    <li class="particle"></li>
    <li class="particle"></li>
    <li class="particle"></li>
  </ul>

  <!-- Login Card -->
  <div class="login-container">
    <div class="logo-container">
      <div class="logo-badge">
        <i class="fa-solid fa-user-graduate"></i>
      </div>
      <h1>Student Portal</h1>
      <p>Secure Access to SGI Bus Management</p>
    </div>

    <form id="loginForm">
      <input type="hidden" id="role" value="student">

      <div class="input-group">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="username" placeholder="Email or Phone Number" required>
      </div>

      <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="password" placeholder="Password" required>
      </div>

      <button type="submit" class="login-btn">
        Sign In <i class="fa-solid fa-arrow-right-to-bracket"></i>
      </button>

      <div class="forgot-links">
        <a href="/forgot_password.html" id="forgotLink"><i class="fa-solid fa-circle-question"></i> Student Help</a>
      </div>
    </form>
    
    <div id="loginMsg" class="message"></div>
  </div>

  <script src="js/script.js?v=4"></script>
</body>
</html>
